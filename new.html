<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hiragana Quiz App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f7fa;
    }

    .container {
      margin-top: 40px;
    }

    h1 {
      font-size: 70px;
    }

    input, select {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      border: none;
    }

    #result {
      font-weight: bold;
      margin-top: 10px;
    }

    .correct { color: green; }
    .wrong { color: red; }

    .score-box {
      position: fixed;
      left: 20px;
      top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #timer {
      font-size: 20px;
      color: red;
    }
  </style>
</head>

<body>

<div class="score-box">
  <h3>Progress</h3>
  Score: <span id="score">0</span><br>
  Total: <span id="total">0</span><br>
  Time: <span id="timer">0</span>s
</div>

<div class="container">
  <h2>Hiragana Quiz</h2>

  <label>Select Questions:</label>
  <select id="questionCount">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15">15</option>
  </select>

  <br>
  <button onclick="startQuiz()">Start Quiz</button>

  <h1 id="char">-</h1>

  <input id="answer" placeholder="Type romaji">
  <br>

  <button onclick="checkAnswer()">Check</button>
  <button onclick="nextChar()">Next</button>

  <p id="result"></p>
</div>

<script>
const hiragana = [
  { char: "あ", romaji: "a" },
  { char: "い", romaji: "i" },
  { char: "う", romaji: "u" },
  { char: "え", romaji: "e" },
  { char: "お", romaji: "o" },
  { char: "か", romaji: "ka" },
  { char: "き", romaji: "ki" },
  { char: "く", romaji: "ku" },
  { char: "け", romaji: "ke" },
  { char: "こ", romaji: "ko" }
];

let current;
let score = 0;
let total = 0;
let maxQuestions = 5;
let timer = 0;
let interval;

function startQuiz() {
  score = 0;
  total = 0;
  timer = 0;

  maxQuestions = parseInt(document.getElementById("questionCount").value);

  document.getElementById("score").innerText = score;
  document.getElementById("total").innerText = total;

  clearInterval(interval);
  interval = setInterval(() => {
    timer++;
    document.getElementById("timer").innerText = timer;
  }, 1000);

  nextChar();
}

function nextChar() {
  if (total >= maxQuestions) {
    clearInterval(interval);
    document.getElementById("char").innerText = "Finished!";
    document.getElementById("result").innerText =
      "Final Score: " + score + " / " + total;
    return;
  }

  current = hiragana[Math.floor(Math.random() * hiragana.length)];
  document.getElementById("char").innerText = current.char;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
}

function checkAnswer() {
  const user = document.getElementById("answer").value.trim().toLowerCase();

  if (!user) return;

  total++;

  if (user === current.romaji) {
    score++;
    document.getElementById("result").innerText = "✅ Correct";
    document.getElementById("result").className = "correct";
  } else {
    document.getElementById("result").innerText =
      "❌ Wrong! " + current.romaji;
    document.getElementById("result").className = "wrong";
  }

  document.getElementById("score").innerText = score;
  document.getElementById("total").innerText = total;
}

// Enter key
document.getElementById("answer").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    checkAnswer();
  }
});
</script>

</body>
</html>
