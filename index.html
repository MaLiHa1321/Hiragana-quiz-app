<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>🎌 Hiragana Trainer</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="animated-bg"></div>
  
  <div class="layout">
    <!-- LEFT PANEL - GAME -->
    <div class="game-panel glass-effect">
      <div class="top-bar">
        <div class="logo">
          <span class="logo-icon">🎌</span>
          <h2>Hiragana Quiz</h2>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-header">
          <span>Progress</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">🏆</div>
          <div class="stat-info">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="score">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏱️</div>
          <div class="stat-info">
            <span class="stat-label">Time</span>
            <span class="stat-value" id="time">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📊</div>
          <div class="stat-info">
            <span class="stat-label">Accuracy</span>
            <span class="stat-value" id="accuracyDisplay">0%</span>
          </div>
        </div>
      </div>

      <!-- Quiz Card -->
      <div class="quiz-card">
        <div class="hiragana-wrapper">
          <div class="hiragana-glow"></div>
          <h1 id="hiragana">--</h1>
        </div>

        <div class="input-wrapper">
          <input id="answer" type="text" placeholder="Type romaji here..." autocomplete="off"/>
          <div class="input-highlight"></div>
        </div>

        <div id="feedback" class="feedback-message"></div>

        <div class="action-buttons">
          <button id="checkBtn" class="btn-primary">✓ Check</button>
          <button id="nextBtn" class="btn-secondary" disabled>→ Next</button>
        </div>
        <div class="enter-hint">💡 Press <kbd>Enter</kbd> to check answer</div>
      </div>

      <!-- Result Modal -->
      <div class="result hidden" id="resultBox">
        <div class="result-card">
          <div class="celebration-icon">🎉</div>
          <h2>Quiz Complete!</h2>
          <div class="result-stats">
            <div class="result-stat"><span>Final Score</span><strong id="finalScore"></strong></div>
            <div class="result-stat"><span>Accuracy</span><strong id="accuracy"></strong></div>
          </div>
          <button onclick="location.reload()" class="btn-primary">Play Again 🔄</button>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL - SETTINGS -->
    <div class="dashboard glass-effect">
      <div class="settings-card">
        <div class="card-header">
          <h3>⚙️ Quiz Settings</h3>
          <button id="themeToggle" class="icon-btn">🌙</button>
        </div>
        
        <div class="setting-group">
          <label>📚 Questions</label>
          <select id="questionCount" class="modern-select">
            <option value="5">5 Questions</option>
            <option value="10" selected>10 Questions</option>
            <option value="20">20 Questions</option>
            <option value="46">46 Questions (Full Set)</option>
          </select>
        </div>

        <div class="setting-group">
          <label>⏰ Time Limit (seconds)</label>
          <input type="number" id="timeLimit" value="60" class="modern-input"/>
        </div>

        <div class="setting-group">
          <label>🎯 Difficulty</label>
          <select id="difficulty" class="modern-select">
            <option value="easy">Easy (More Time)</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard (Less Time)</option>
          </select>
        </div>

        <div class="setting-group">
          <label>🎨 Theme Color</label>
          <div class="theme-buttons">
            <button class="theme-btn" data-theme="purple">💜</button>
            <button class="theme-btn" data-theme="blue">💙</button>
            <button class="theme-btn" data-theme="green">💚</button>
            <button class="theme-btn" data-theme="orange">🧡</button>
            <button class="theme-btn" data-theme="pink">💗</button>
          </div>
        </div>

        <button id="startBtn" class="btn-start">🚀 Start Quiz</button>
      </div>

      <div class="performance-card">
        <h3>📈 Recent Performance</h3>
        <canvas id="performanceChart" width="300" height="150"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script src="script.js"></script>
</body>
</html>
