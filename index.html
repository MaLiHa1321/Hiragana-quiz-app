<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title> Quiz App | Learn Japanese</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
</head>
<body>

<div class="container">
  <div class="animated-bg"></div>
  
  <div class="layout">
    <!-- LEFT: Game Area -->
    <div class="game-panel glass">
      <div class="top-bar">
        <div class="logo">
          <span class="logo-icon">あ</span>
          <h2>Hiragana Quiz</h2>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-section">
        <div class="progress-header">
          <span>📖 Journey</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">🏆</div>
          <div class="stat-info">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="score">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏱️</div>
          <div class="stat-info">
            <span class="stat-label">Time Left</span>
            <span class="stat-value" id="time">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎯</div>
          <div class="stat-info">
            <span class="stat-label">Accuracy</span>
            <span class="stat-value" id="accuracyDisplay">0%</span>
          </div>
        </div>
      </div>

      <!-- Main Quiz Card -->
      <div class="quiz-card">
        <div class="hiragana-wrapper">
          <div class="hiragana-glow"></div>
          <h1 id="hiragana">✨</h1>
        </div>

        <div class="input-group">
          <input type="text" id="answer" placeholder="Type romaji here... (ex: ka, shi, tsu)" autocomplete="off" />
          <div class="input-focus-line"></div>
        </div>

        <div id="feedback" class="feedback"></div>

        <div class="button-group">
          <button id="checkBtn" class="btn check">✓ Check</button>
          <button id="nextBtn" class="btn next" disabled>→ Next</button>
        </div>
        <div class="hint">💡 Press <kbd>Enter</kbd> → Check answer</div>
      </div>

      <!-- Completion Modal -->
      <div id="resultModal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-emoji">🎉🏆🎊</div>
          <h2>Quiz Complete!</h2>
          <p style="margin: 8px 0 16px; color: #666;">Great effort, learner!</p>
          <div class="modal-stats">
            <div class="modal-stat"><span>Final Score</span><strong id="finalScore">0</strong></div>
            <div class="modal-stat"><span>Accuracy</span><strong id="finalAccuracy">0%</strong></div>
          </div>
          <button id="playAgainBtn" class="btn restart">🔄 Play Again</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Settings & Stats -->
    <div class="dashboard glass">
      <div class="settings-card">
        <div class="card-header">
          <h3>⚙️ Quiz Settings</h3>
          <button id="darkModeToggle" class="icon-btn" aria-label="Dark mode">🌙</button>
        </div>

        <div class="setting">
          <label>📚 Number of questions</label>
          <select id="questionCount" class="modern-input">
            <option value="5">5 questions</option>
            <option value="10" selected>10 questions</option>
            <option value="20">20 questions</option>
            <option value="46">46 (Full Hiragana)</option>
          </select>
        </div>

        <div class="setting">
          <label>⏲️ Time limit (seconds)</label>
          <input type="number" id="timeLimit" value="45" class="modern-input" min="15" max="180" />
        </div>

        <div class="setting">
          <label>⚡ Difficulty</label>
          <select id="difficulty" class="modern-input">
            <option value="easy">Easy (+30 sec)</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard (-15 sec)</option>
          </select>
        </div>

        <button id="startQuizBtn" class="btn-start">🚀 Start Quiz</button>
        <p class="info-text">✨ Choose settings above, then click Start</p>
      </div>

      <div class="mini-stats">
        <h3>📈 Your Progress</h3>
        <canvas id="miniChart" width="280" height="120" style="width:100%; height:auto; background:rgba(255,255,255,0.3); border-radius:18px;"></canvas>
        <div class="streak-badge" id="streakBadge">⭐ Streak: 0</div>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script src="script.js"></script>
</body>
</html>
